<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <!-- ================================================
         TEAM CUSTOMIZATION -- CHANGE THIS
         Replace with your app name.
         Example: <title>VetConnect -- Veterans Housing Portal</title>
    ================================================ -->
    <title>CivicScale: Federal Grant Systems</title>
 
    <style>
        /* ================================================
           TEAM CUSTOMIZATION -- CHANGE COLORS, FONTS, LAYOUT
           Do NOT change the form field name= attributes.
        ================================================ */
        body { font-family: Public Sans, sans-serif; max-width: 620px;
               margin: 60px auto; padding: 0 20px; background: #EEEEEE; }
        h1   { color: #1a3a5c; margin-bottom: 4px; }
        .subtitle { color: #555; margin-bottom: 28px; font-size: 15px; }
        form { background: white; padding: 30px; border-radius: 6px;
               box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-row  { display: flex; gap: 16px; }
        .form-group { display: flex; flex-direction: column; flex: 1; margin-bottom: 18px; }
        label  { font-weight: bold; color: #333; margin-bottom: 6px; font-size: 14px; }
        input, select { padding: 10px; border: 1px solid #ccc;
                        border-radius: 4px; font-size: 14px; }
        button { width: 100%; background: #1a3a5c; color: white; padding: 13px;
                 border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
        button:hover { background: #2a5a8c; }
        .message { background: #d4edda; color: #155724; padding: 12px 16px;
                   border-radius: 4px; margin-bottom: 20px; }
        .view-link { display: block; text-align: center; margin-top: 20px; color: #1a3a5c; }
    </style>
</head>
<body>
 
    <!-- ================================================
         TEAM CUSTOMIZATION -- CHANGE THIS
         Replace h1 and subtitle with your app name and purpose.
         Examples:
           App: VetConnect
           Purpose: Register below to apply for federal veterans
                    housing assistance through the VA Support Network.
    ================================================ -->
    <h1>CivicScale</h1>
    <p class="subtitle">CivicScale is a mission-critical federal grant administration platform. Register below to apply for Federal Grants</p>
 
    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}
 
    <!-- DO NOT CHANGE ANYTHING BELOW THIS LINE EXCEPT THE BUTTON TEXT -->
    <form method="POST" action="/">
        <div class="form-row">
            <div class="form-group">
                <label>First Name</label>
                <!-- DO NOT CHANGE: name="first_name" -->
                <input type="text" name="first_name" placeholder="John" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <!-- DO NOT CHANGE: name="last_name" -->
                <input type="text" name="last_name" placeholder="Doe" required>
            </div>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <!-- DO NOT CHANGE: name="email" -->
            <input type="email" name="email" placeholder="youremail@example.com" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>City</label>
                <!-- DO NOT CHANGE: name="city" -->
                <input type="text" name="city" placeholder="Austin" required>
            </div>
            <div class="form-group">

                <label>State</label>
                <!-- DO NOT CHANGE: name="state" -->
                <select name="state" required>
                    <option value="">-- State --</option>
                    <option>Alabama</option><option>Alaska</option>
                    <option>Arizona</option><option>Arkansas</option>
                    <option>California</option><option>Colorado</option>
                    <option>Connecticut</option><option>Delaware</option>
                    <option>Florida</option><option>Georgia</option>
                    <option>Hawaii</option><option>Idaho</option>
                    <option>Illinois</option><option>Indiana</option>
                    <option>Iowa</option><option>Kansas</option>
                    <option>Kentucky</option><option>Louisiana</option>
                    <option>Maine</option><option>Montana</option>
                    <option>Nebraska</option><option>Nevada</option>
                    <option>New Hampshire</option><option>New Jersey</option>
                    <option>New Mexico</option><option>New York</option>
                    <option>North Carolina</option><option>North Dakota</option>
                    <option>Ohio</option><option>Oklahoma</option>
                    <option>Oregon</option><option>Pennsylvania</option>
                    <option>Rhode Island</option><option>South Carolina</option>
                    <option>South Dakota</option><option>Tennessee</option>
                    <option>Texas</option><option>Utah</option>
                    <option>Vermont</option><option>Virginia</option>
                    <option>Washington</option><option>West Virginia</option>
                    <option>Wisconsin</option><option>Wyoming</option>
                </select>
            </div>
        </div>
        <!-- ================================================
             TEAM CUSTOMIZATION -- CHANGE BUTTON TEXT
             Examples: Apply for Benefits / Register for Relief
        ================================================ -->
        <button type="submit">Apply for Federal Grants</button>
    </form>
    <a class="view-link" href="/registrations">View All Registrations</a>
</body>
</html>
